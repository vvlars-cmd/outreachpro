<h2>Pipeline CRM</h2>
<p>La board Kanban ti permette di seguire ogni trattativa dalla scoperta alla chiusura.</p>
<h3>Stadi</h3>
<p>Prospect → Contattato → Riunione → Proposta → Vinto / Perso</p>
<h3>Spostare trattative</h3>
<p>Trascina e rilascia le card tra le colonne, o usa il pulsante → per avanzare allo stadio successivo.</p>
