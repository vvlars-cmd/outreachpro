<h2>Kampagnen-Verwaltung</h2><p>Jede Kampagne hat einen Namen, ein tägliches Sendelimit und Sequenzschritte. Klicken Sie auf <strong>+ Neue Kampagne</strong>, setzen Sie Namen und Tageslimit (50–100 empfohlen).</p><h3>A/B-Tests</h3><p>Aktivieren Sie A/B für jeden Schritt, um zwei Betreffzeilen 50/50 zu testen.</p>
