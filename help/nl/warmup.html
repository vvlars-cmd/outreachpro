<h2>E-mailwarmup</h2>
<p>Warmup verbetert uw afzenderreputatie voor een betere inboxbezorging.</p>
<h3>Hoe het werkt</h3>
<p>Het systeem begint met 5 e-mails/dag en verhoogt geleidelijk naar 50 in 14 dagen.</p>
<h3>Warmup activeren</h3>
<p>Ga naar E-mailaccounts → selecteer uw account → klik op "Warmup activeren".</p>
