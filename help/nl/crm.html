<h2>CRM Pipeline</h2>
<p>Het Kanban-bord toont de voortgang van elke deal van prospect tot gesloten verkoop.</p>
<h3>Stadia</h3>
<p>Prospect → Gecontacteerd → Vergadering → Voorstel → Gewonnen / Verloren</p>
<h3>Deals verplaatsen</h3>
<p>Versleep kaarten tussen kolommen, of gebruik de → knop om naar het volgende stadium te gaan.</p>
